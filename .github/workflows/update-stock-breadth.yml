name: Update stock breadth snapshot

on:
  workflow_dispatch:
  schedule:
    # After US market close; daily on weekdays.
    - cron: '30 22 * * 1-5'

permissions:
  contents: write

jobs:
  update-stock-breadth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build breadth snapshot
        run: python scripts/build_stock_breadth_snapshot.py
      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/market-breadth-latest.json
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "chore: update stock breadth snapshot"
            git push
          fi
